<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PSL Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e0e0e0; padding: 32px; max-width: 600px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 24px; color: #7b68ee; }
    h2 { font-size: 14px; margin-bottom: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .source-list { list-style: none; margin-bottom: 24px; }
    .source-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #1a1a2e; border-radius: 6px; margin-bottom: 8px; }
    .source-name { font-weight: 600; color: #7b68ee; }
    .source-url { font-size: 12px; color: #888; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .source-time { font-size: 11px; color: #666; }
    .source-error { font-size: 11px; color: #ff6b6b; }
    .btn { border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #7b68ee; color: white; }
    .btn-danger { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b; }
    .btn-secondary { background: transparent; color: #aaa; border: 1px solid #444; }
    .add-form { display: flex; gap: 8px; margin-bottom: 16px; }
    .add-form input { flex: 1; background: #1a1a2e; border: 1px solid #333; border-radius: 4px; padding: 8px 12px; color: #e0e0e0; font-size: 13px; }
    .add-form input::placeholder { color: #666; }
    .toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
    .toggle input { accent-color: #7b68ee; }
    .actions { display: flex; gap: 8px; }
    .status { font-size: 12px; color: #888; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>PSL — Product Spec Language</h1>

  <h2>Loaded PSLs</h2>
  <ul class="source-list" id="sources"></ul>

  <h2>Add PSL Source</h2>
  <div class="add-form">
    <input type="text" id="urlInput" placeholder="https://raw.githubusercontent.com/owner/repo/main/PSL.md">
    <button class="btn btn-primary" id="addBtn">Add</button>
  </div>

  <div class="toggle">
    <input type="checkbox" id="autoDetect" checked>
    <label for="autoDetect">Auto-detect PSL.md on GitHub repo pages</label>
  </div>

  <div class="actions">
    <button class="btn btn-secondary" id="refreshBtn">Refresh All</button>
  </div>
  <div class="status" id="status"></div>

  <script>
    async function render() {
      const data = await chrome.runtime.sendMessage({ type: "getVocabularies" });
      const list = document.getElementById("sources");
      list.innerHTML = "";

      if (!data?.sources?.length) {
        list.innerHTML = '<li style="color:#666;padding:12px">No PSL files loaded. Add a URL above.</li>';
        return;
      }

      for (const source of data.sources) {
        const li = document.createElement("li");
        li.className = "source-item";
        li.innerHTML = `
          <div style="flex:1">
            <div class="source-name">${source.productName}</div>
            <div class="source-url">${source.url}</div>
            ${source.lastFetched ? `<div class="source-time">Last fetched: ${new Date(source.lastFetched).toLocaleString()}</div>` : ""}
            ${source.error ? `<div class="source-error">${source.error}</div>` : ""}
          </div>
          <button class="btn btn-danger" data-url="${source.url}">Remove</button>
        `;
        li.querySelector(".btn-danger").onclick = async () => {
          await chrome.runtime.sendMessage({ type: "removeSource", url: source.url });
          render();
        };
        list.appendChild(li);
      }
    }

    document.getElementById("addBtn").onclick = async () => {
      const input = document.getElementById("urlInput");
      const url = input.value.trim();
      if (!url) return;

      document.getElementById("status").textContent = "Fetching...";
      const result = await chrome.runtime.sendMessage({ type: "addSource", url });
      if (result.ok) {
        input.value = "";
        document.getElementById("status").textContent = `Added: ${result.productName}`;
        render();
      } else {
        document.getElementById("status").textContent = `Error: ${result.error}`;
      }
    };

    document.getElementById("refreshBtn").onclick = async () => {
      document.getElementById("status").textContent = "Refreshing...";
      await chrome.runtime.sendMessage({ type: "refresh" });
      document.getElementById("status").textContent = "Refreshed!";
      render();
    };

    render();
  </script>
</body>
</html>
